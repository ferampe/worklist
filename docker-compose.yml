services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_USER: worklist
      MYSQL_PASSWORD: worklist_dev
      MYSQL_DATABASE: worklist
      MYSQL_ROOT_PASSWORD: root_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
